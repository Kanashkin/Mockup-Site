<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f0f;
      --surface: #1a1a1a;
      --border:  #2a2a2a;
      --accent:  #e8ff47;
      --text:    #f0f0f0;
      --muted:   #666;
      --radius:  12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
    }

    .workspace {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 640px) {
      .workspace { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-label {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel-body {
      padding: 18px;
    }

    /* Drop zone */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .dropzone:hover,
    .dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(232, 255, 71, 0.04);
    }

    .dropzone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .dropzone-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
    }

    .dropzone-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .dropzone-text strong {
      color: var(--accent);
      font-weight: 600;
    }

    /* Preview inside dropzone */
    .dropzone-preview {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 6px;
      display: none;
      margin-bottom: 12px;
    }

    .dropzone-preview.visible { display: block; }

    /* Render button */
    .btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn:hover:not(:disabled) { opacity: 0.88; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Result panel */
    .result-placeholder {
      aspect-ratio: 2/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      gap: 10px;
      border-radius: 8px;
      background: var(--bg);
    }

    .result-placeholder svg { opacity: 0.25; }

    .result-img {
      width: 100%;
      border-radius: 8px;
      display: none;
    }

    .result-img.visible { display: block; }

    .download-btn {
      display: none;
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-align: center;
      text-decoration: none;
    }

    .download-btn.visible { display: block; }
    .download-btn:hover { background: rgba(232,255,71,0.08); }

    /* Progress / status */
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
    }

    .status.error { color: #ff6b6b; }
    .status.loading { color: var(--accent); }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(232,255,71,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    footer {
      margin-top: 48px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>

  <header>
    <h1>T-Shirt <span>Mockup</span></h1>
    <p>Upload your design — get a realistic mockup in seconds</p>
  </header>

  <div class="workspace">
    <!-- Left: upload -->
    <div class="panel">
      <div class="panel-label">Your Design</div>
      <div class="panel-body">
        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" accept="image/*">
          <img class="dropzone-preview" id="preview" alt="preview">
          <span class="dropzone-icon" id="dropIcon">🖼️</span>
          <div class="dropzone-text" id="dropText">
            <strong>Click to upload</strong> or drag & drop<br>
            PNG, JPG, SVG — any size
          </div>
        </div>

        <button class="btn" id="renderBtn" disabled>Generate Mockup →</button>
        <div class="status" id="status"></div>
      </div>
    </div>

    <!-- Right: result -->
    <div class="panel">
      <div class="panel-label">Result</div>
      <div class="panel-body">
        <div class="result-placeholder" id="placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 16l4-4 4 4 4-6 4 6"/>
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          Mockup will appear here
        </div>
        <img class="result-img" id="resultImg" alt="mockup">
        <a class="download-btn" id="downloadBtn" download="mockup.png">↓ Download PNG</a>
      </div>
    </div>
  </div>

  <footer>Powered by Photoshop-accurate warp rendering</footer>

  <script>
    const fileInput  = document.getElementById('fileInput');
    const dropzone   = document.getElementById('dropzone');
    const preview    = document.getElementById('preview');
    const dropIcon   = document.getElementById('dropIcon');
    const dropText   = document.getElementById('dropText');
    const renderBtn  = document.getElementById('renderBtn');
    const status     = document.getElementById('status');
    const placeholder = document.getElementById('placeholder');
    const resultImg  = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');

    let selectedFile = null;

    // Drag-over styling
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) handleFile(f);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      selectedFile = file;
      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.classList.add('visible');
      dropIcon.style.display = 'none';
      dropText.innerHTML = `<strong>${file.name}</strong><br>${(file.size/1024).toFixed(0)} KB`;
      renderBtn.disabled = false;
      status.textContent = '';
    }

    renderBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      renderBtn.disabled = true;
      status.className = 'status loading';
      status.innerHTML = '<span class="spinner"></span>Rendering...';

      placeholder.style.display = 'none';
      resultImg.classList.remove('visible');
      downloadBtn.classList.remove('visible');

      const form = new FormData();
      form.append('file', selectedFile);

      try {
        const res = await fetch('/render', { method: 'POST', body: form });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
          throw new Error(err.detail || `Server error ${res.status}`);
        }

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);

        resultImg.src = url;
        resultImg.classList.add('visible');
        downloadBtn.href = url;
        downloadBtn.classList.add('visible');

        status.className = 'status';
        status.textContent = '✓ Done';
      } catch (err) {
        status.className = 'status error';
        status.textContent = '✗ ' + err.message;
        placeholder.style.display = '';
      } finally {
        renderBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
