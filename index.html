<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --accent: #e8ff47; --text: #f0f0f0; --muted: #555;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 32px 16px; gap: 24px;
    }
    h1 { font-size: 30px; font-weight: 700; letter-spacing: -1px; }
    h1 span { color: var(--accent); }
    .sub { color: var(--muted); font-size: 14px; margin-top: 4px; text-align:center; }

    .main { display: flex; gap: 28px; width: 100%; max-width: 1060px; align-items: flex-start; }

    /* Canvas preview */
    .preview-wrap {
      flex: 0 0 auto;
      position: relative;
      width: 460px;
    }
    #previewCanvas {
      width: 460px;
      height: 690px;
      border-radius: 12px;
      display: block;
      cursor: crosshair;
    }
    #previewCanvas.has-design { cursor: move; }

    /* Upload overlay when no design */
    #uploadOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 12px;
      background: rgba(0,0,0,0.45);
      cursor: pointer;
      transition: background .2s;
    }
    #uploadOverlay:hover { background: rgba(0,0,0,0.6); }
    #uploadOverlay input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width:100%; height:100%; }
    #uploadOverlay .icon { font-size: 40px; }
    #uploadOverlay .txt { font-size: 14px; color: #fff; font-weight: 600; }
    #uploadOverlay .sub2 { font-size: 12px; color: rgba(255,255,255,0.5); }
    #uploadOverlay.hidden { display: none; }

    /* Sidebar */
    .sidebar { flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .card-title {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
    }
    .card-body { padding: 16px; }

    .sliders { display: flex; flex-direction: column; gap: 12px; }
    .row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .row label { width: 52px; color: var(--muted); font-size: 12px; }
    .row input[type=range] { flex: 1; accent-color: var(--accent); }
    .row span { width: 36px; text-align: right; font-size: 12px; color: var(--text); }

    .hint { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

    .btn {
      width: 100%; padding: 13px; background: var(--accent);
      color: #111; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    .btn:disabled { opacity: .3; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: .85; }
    .btn-secondary {
      width: 100%; padding: 10px; background: transparent;
      color: var(--muted); border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; cursor: pointer; transition: border-color .2s, color .2s;
      margin-top: 8px;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .dl {
      display: none; width: 100%; margin-top: 10px; padding: 11px;
      background: transparent; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 8px;
      font-size: 13px; font-weight: 600; text-align: center; text-decoration: none;
    }
    .dl.show { display: block; }
    #resultImg { width: 100%; border-radius: 8px; display: none; margin-top: 8px; }
    #resultImg.show { display: block; }
    .status { margin-top: 8px; font-size: 12px; color: var(--muted); text-align: center; min-height: 16px; }
    .status.err { color: #f66; }
    .status.ok  { color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid rgba(232,255,71,.3); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 4px;
    }
  </style>
</head>
<body>

<h1>T-Shirt <span>Mockup</span></h1>
<p class="sub">Upload your design — position it live on the shirt</p>

<div class="main">

  <!-- Live preview canvas -->
  <div class="preview-wrap">
    <canvas id="previewCanvas" width="460" height="690"></canvas>
    <div id="uploadOverlay">
      <input type="file" id="fileInput" accept="image/*">
      <div class="icon">🎨</div>
      <div class="txt">Click to upload design</div>
      <div class="sub2">PNG, JPG — transparency supported</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="card" id="adjustCard">
      <div class="card-title">Position & Size</div>
      <div class="card-body">
        <div class="sliders">
          <div class="row">
            <label>Size</label>
            <input type="range" id="sSize" min="20" max="100" value="45">
            <span id="vSize">45%</span>
          </div>
          <div class="row">
            <label>X</label>
            <input type="range" id="sX" min="0" max="100" value="50">
            <span id="vX">50%</span>
          </div>
          <div class="row">
            <label>Y</label>
            <input type="range" id="sY" min="0" max="100" value="38">
            <span id="vY">38%</span>
          </div>
        </div>
        <p class="hint">💡 Drag design directly on the shirt, or use sliders</p>
        <button class="btn-secondary" id="resetBtn">↺ Reset position</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Export</div>
      <div class="card-body">
        <button class="btn" id="renderBtn" disabled>Generate High-Res →</button>
        <div class="status" id="status"></div>
        <img id="resultImg" alt="mockup result">
        <a class="dl" id="dlBtn" download="mockup.png">↓ Download PNG</a>
      </div>
    </div>

  </div>
</div>

<script>
  const canvas  = document.getElementById('previewCanvas');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('uploadOverlay');
  const renderBtn = document.getElementById('renderBtn');
  const status    = document.getElementById('status');
  const resultImg = document.getElementById('resultImg');
  const dlBtn     = document.getElementById('dlBtn');
  const sSize = document.getElementById('sSize'), vSize = document.getElementById('vSize');
  const sX    = document.getElementById('sX'),    vX    = document.getElementById('vX');
  const sY    = document.getElementById('sY'),    vY    = document.getElementById('vY');

  const CW = 460, CH = 690; // canvas display size
  // Source space (warp coords)
  const SRC_W = 2342, SRC_H = 2616;

  let shirtImg  = new Image();
  let designImg = null;
  let file      = null;

  // Position state (0–1 normalized, center of design)
  let pos = { cx: 0.5, cy: 0.38, size: 0.45 };

  // Load shirt preview
  shirtImg.src = '/shirt_preview.png';
  shirtImg.onload = () => draw();

  // Upload
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) loadDesign(e.target.files[0]);
  });

  function loadDesign(f) {
    file = f;
    const img = new Image();
    img.onload = () => {
      designImg = img;
      overlay.classList.add('hidden');
      canvas.classList.add('has-design');
      renderBtn.disabled = false;
      draw();
    };
    img.src = URL.createObjectURL(f);
  }

  // Draw everything
  function draw() {
    ctx.clearRect(0, 0, CW, CH);

    // Draw shirt
    if (shirtImg.complete && shirtImg.naturalWidth) {
      ctx.drawImage(shirtImg, 0, 0, CW, CH);
    }

    if (!designImg) return;

    // Design size & position in canvas pixels
    const dSize = pos.size * CW;
    const dx = pos.cx * CW - dSize / 2;
    const dy = pos.cy * CH - dSize / 2;

    // Draw design with multiply blend
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.drawImage(designImg, dx, dy, dSize, dSize);
    ctx.restore();

    // Draw selection border
    ctx.save();
    ctx.strokeStyle = '#e8ff47';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.strokeRect(dx, dy, dSize, dSize);
    ctx.restore();

    // Draw resize handle
    ctx.fillStyle = '#e8ff47';
    ctx.fillRect(dx + dSize - 8, dy + dSize - 8, 14, 14);
  }

  // Sliders → update pos → draw
  sSize.addEventListener('input', () => {
    pos.size = +sSize.value / 100;
    vSize.textContent = sSize.value + '%';
    draw();
  });
  sX.addEventListener('input', () => {
    pos.cx = +sX.value / 100;
    vX.textContent = sX.value + '%';
    draw();
  });
  sY.addEventListener('input', () => {
    pos.cy = +sY.value / 100;
    vY.textContent = sY.value + '%';
    draw();
  });

  // Sync sliders from pos
  function syncSliders() {
    sSize.value = Math.round(pos.size * 100); vSize.textContent = sSize.value + '%';
    sX.value    = Math.round(pos.cx   * 100); vX.textContent    = sX.value + '%';
    sY.value    = Math.round(pos.cy   * 100); vY.textContent    = sY.value + '%';
  }

  // Reset
  document.getElementById('resetBtn').addEventListener('click', () => {
    pos = { cx: 0.5, cy: 0.38, size: 0.45 };
    syncSliders();
    draw();
  });

  // ── Drag on canvas ──────────────────────────────────────────────────────────
  let dragging = false, resizing = false;
  let dragStartX, dragStartY, dragStartCx, dragStartCy;
  let resizeStartX, resizeStartSize;

  function getDesignRect() {
    const dSize = pos.size * CW;
    return {
      x: pos.cx * CW - dSize / 2,
      y: pos.cy * CH - dSize / 2,
      s: dSize
    };
  }

  function isOnHandle(mx, my) {
    const r = getDesignRect();
    return mx >= r.x + r.s - 8 && mx <= r.x + r.s + 6 &&
           my >= r.y + r.s - 8 && my <= r.y + r.s + 6;
  }

  function isOnDesign(mx, my) {
    const r = getDesignRect();
    return mx >= r.x && mx <= r.x + r.s && my >= r.y && my <= r.y + r.s;
  }

  canvas.addEventListener('mousedown', e => {
    if (!designImg) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (CW / rect.width);
    const my = (e.clientY - rect.top)  * (CH / rect.height);
    if (isOnHandle(mx, my)) {
      resizing = true;
      resizeStartX    = mx;
      resizeStartSize = pos.size;
    } else if (isOnDesign(mx, my)) {
      dragging = true;
      dragStartX  = mx; dragStartY  = my;
      dragStartCx = pos.cx; dragStartCy = pos.cy;
    }
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging && !resizing) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (CW / rect.width);
    const my = (e.clientY - rect.top)  * (CH / rect.height);

    if (dragging) {
      pos.cx = Math.max(0, Math.min(1, dragStartCx + (mx - dragStartX) / CW));
      pos.cy = Math.max(0, Math.min(1, dragStartCy + (my - dragStartY) / CH));
    } else if (resizing) {
      const delta = (mx - resizeStartX) / CW;
      pos.size = Math.max(0.1, Math.min(1, resizeStartSize + delta * 2));
    }
    syncSliders();
    draw();
  });

  document.addEventListener('mouseup', () => { dragging = false; resizing = false; });

  // Touch support
  canvas.addEventListener('touchstart', e => {
    if (!designImg) return;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const mx = (t.clientX - rect.left) * (CW / rect.width);
    const my = (t.clientY - rect.top)  * (CH / rect.height);
    if (isOnDesign(mx, my)) {
      dragging = true;
      dragStartX=mx; dragStartY=my; dragStartCx=pos.cx; dragStartCy=pos.cy;
    }
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchmove', e => {
    if (!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    const mx = (t.clientX - rect.left) * (CW / rect.width);
    const my = (t.clientY - rect.top)  * (CH / rect.height);
    pos.cx = Math.max(0,Math.min(1, dragStartCx + (mx-dragStartX)/CW));
    pos.cy = Math.max(0,Math.min(1, dragStartCy + (my-dragStartY)/CH));
    syncSliders(); draw();
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', () => dragging=false);

  // ── Render ──────────────────────────────────────────────────────────────────
  renderBtn.addEventListener('click', async () => {
    if (!file) return;

    // Convert normalized pos → source space coords
    const dSizePx = pos.size * CW;
    const dx = pos.cx * CW - dSizePx / 2;
    const dy = pos.cy * CH - dSizePx / 2;

    const scaleX = SRC_W / CW;
    const scaleY = SRC_H / CH;

    const sx = Math.round(dx    * scaleX);
    const sy = Math.round(dy    * scaleY);
    const sw = Math.round(dSizePx * scaleX);
    const sh = Math.round(dSizePx * scaleY);

    renderBtn.disabled = true;
    status.className = 'status';
    status.innerHTML = '<span class="spin"></span>Rendering high-res…';
    resultImg.classList.remove('show');
    dlBtn.classList.remove('show');

    const form = new FormData();
    form.append('file', file);
    form.append('x', sx);
    form.append('y', sy);
    form.append('w', sw);
    form.append('h', sh);

    try {
      const res = await fetch('/render', { method: 'POST', body: form });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const url = URL.createObjectURL(await res.blob());
      resultImg.src = url;
      resultImg.classList.add('show');
      dlBtn.href = url;
      dlBtn.classList.add('show');
      status.className = 'status ok';
      status.textContent = '✓ Done';
    } catch (err) {
      status.className = 'status err';
      status.textContent = '✗ ' + err.message;
    } finally {
      renderBtn.disabled = false;
    }
  });
</script>
</body>
</html>
