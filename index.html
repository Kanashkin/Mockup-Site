<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --surface: #1c1c1c;
      --border: #2e2e2e;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .workspace {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 1000px;
      align-items: flex-start;
    }

    /* LEFT PANEL — editor */
    .editor-panel {
      flex: 0 0 auto;
      position: relative;
      width: 400px;
    }

    .canvas-wrap {
      position: relative;
      width: 400px;
      height: 600px;
      border-radius: 12px;
      overflow: hidden;
      background: #222;
      cursor: default;
    }

    #shirtImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
    }

    #designLayer {
      position: absolute;
      cursor: move;
      user-select: none;
      touch-action: none;
      transform-origin: center center;
    }

    #designLayer img {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .resize-handle {
      position: absolute;
      bottom: -6px;
      right: -6px;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 3px;
      cursor: se-resize;
    }

    .design-border {
      position: absolute;
      inset: 0;
      border: 2px solid var(--accent);
      pointer-events: none;
    }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-label {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel-body { padding: 16px; }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .dropzone:hover { border-color: var(--accent); }
    .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dropzone-icon { font-size: 28px; display: block; margin-bottom: 8px; }
    .dropzone-text { font-size: 13px; color: var(--muted); }
    .dropzone-text strong { color: var(--accent); }

    .controls { display: flex; flex-direction: column; gap: 12px; }

    .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
    .slider-row label { width: 60px; }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: var(--accent);
    }
    .slider-row span { width: 36px; text-align: right; font-size: 12px; color: var(--text); }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .result-img {
      width: 100%;
      border-radius: 8px;
      display: none;
    }
    .result-img.visible { display: block; }

    .download-btn {
      display: none;
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .download-btn.visible { display: block; }

    .status { margin-top: 8px; font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }
    .status.error { color: #ff6b6b; }
    .status.loading { color: var(--accent); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(232,255,71,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 5px;
    }

    @media (max-width: 700px) {
      .workspace { flex-direction: column; align-items: center; }
      .editor-panel { width: 100%; }
      .canvas-wrap { width: 100%; height: auto; aspect-ratio: 2/3; }
    }
  </style>
</head>
<body>

<h1>T-Shirt <span>Mockup</span></h1>
<p class="subtitle">Position your design on the shirt, then generate</p>

<div class="workspace">

  <!-- Editor canvas -->
  <div class="editor-panel">
    <div class="canvas-wrap" id="canvasWrap">
      <img id="shirtImg" src="/shirt_preview.png" alt="shirt">
      <div id="designLayer" style="display:none; left:100px; top:80px; width:200px; height:200px;">
        <div class="design-border"></div>
        <img id="designImg" src="" alt="design">
        <div class="resize-handle" id="resizeHandle"></div>
      </div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">

    <!-- Upload -->
    <div class="panel">
      <div class="panel-label">Upload Design</div>
      <div class="panel-body">
        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" accept="image/*">
          <span class="dropzone-icon">🖼️</span>
          <div class="dropzone-text"><strong>Click to upload</strong> or drag & drop<br>PNG, JPG — transparent background works best</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="panel" id="controlsPanel" style="display:none">
      <div class="panel-label">Adjust</div>
      <div class="panel-body">
        <div class="controls">
          <div class="slider-row">
            <label>Size</label>
            <input type="range" id="sizeSlider" min="50" max="380" value="200">
            <span id="sizeVal">200</span>
          </div>
          <div class="slider-row">
            <label>X pos</label>
            <input type="range" id="xSlider" min="0" max="350" value="100">
            <span id="xVal">100</span>
          </div>
          <div class="slider-row">
            <label>Y pos</label>
            <input type="range" id="ySlider" min="0" max="520" value="80">
            <span id="yVal">80</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Generate -->
    <div class="panel">
      <div class="panel-label">Result</div>
      <div class="panel-body">
        <button class="btn" id="renderBtn" disabled>Generate Mockup →</button>
        <div class="status" id="status"></div>
        <img class="result-img" id="resultImg" alt="mockup">
        <a class="download-btn" id="downloadBtn" download="mockup.png">↓ Download PNG</a>
      </div>
    </div>

  </div>
</div>

<script>
  const fileInput    = document.getElementById('fileInput');
  const dropzone     = document.getElementById('dropzone');
  const designLayer  = document.getElementById('designLayer');
  const designImg    = document.getElementById('designImg');
  const canvasWrap   = document.getElementById('canvasWrap');
  const renderBtn    = document.getElementById('renderBtn');
  const status       = document.getElementById('status');
  const resultImg    = document.getElementById('resultImg');
  const downloadBtn  = document.getElementById('downloadBtn');
  const controlsPanel = document.getElementById('controlsPanel');
  const sizeSlider   = document.getElementById('sizeSlider');
  const xSlider      = document.getElementById('xSlider');
  const ySlider      = document.getElementById('ySlider');
  const sizeVal      = document.getElementById('sizeVal');
  const xVal         = document.getElementById('xVal');
  const yVal         = document.getElementById('yVal');
  const resizeHandle = document.getElementById('resizeHandle');

  let selectedFile = null;

  // Canvas size constants (shirt is 1334x2000, preview is 400x600)
  const CANVAS_W = 400, CANVAS_H = 600;
  const SHIRT_W = 1334, SHIRT_H = 2000;
  const SCALE_X = SHIRT_W / CANVAS_W;
  const SCALE_Y = SHIRT_H / CANVAS_H;

  // Upload
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.borderColor = 'var(--accent)'; });
  dropzone.addEventListener('dragleave', () => dropzone.style.borderColor = '');
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.style.borderColor = '';
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    selectedFile = file;
    designImg.src = URL.createObjectURL(file);
    designLayer.style.display = 'block';
    controlsPanel.style.display = 'block';
    renderBtn.disabled = false;
    updatePosition();
  }

  // Sliders
  sizeSlider.addEventListener('input', () => { sizeVal.textContent = sizeSlider.value; updatePosition(); });
  xSlider.addEventListener('input', () => { xVal.textContent = xSlider.value; updatePosition(); });
  ySlider.addEventListener('input', () => { yVal.textContent = ySlider.value; updatePosition(); });

  function updatePosition() {
    const s = parseInt(sizeSlider.value);
    const x = parseInt(xSlider.value);
    const y = parseInt(ySlider.value);
    designLayer.style.width  = s + 'px';
    designLayer.style.height = s + 'px';
    designLayer.style.left   = x + 'px';
    designLayer.style.top    = y + 'px';
  }

  // Drag design with mouse
  let dragging = false, dragStartX, dragStartY, layerStartX, layerStartY;

  designLayer.addEventListener('mousedown', e => {
    if (e.target === resizeHandle) return;
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    layerStartX = parseInt(designLayer.style.left);
    layerStartY = parseInt(designLayer.style.top);
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    const newX = Math.max(0, Math.min(CANVAS_W - parseInt(designLayer.style.width), layerStartX + dx));
    const newY = Math.max(0, Math.min(CANVAS_H - parseInt(designLayer.style.height), layerStartY + dy));
    designLayer.style.left = newX + 'px';
    designLayer.style.top  = newY + 'px';
    xSlider.value = newX; xVal.textContent = newX;
    ySlider.value = newY; yVal.textContent = newY;
  });

  document.addEventListener('mouseup', () => dragging = false);

  // Resize handle
  let resizing = false, resizeStartX, resizeStartSize;

  resizeHandle.addEventListener('mousedown', e => {
    resizing = true;
    resizeStartX = e.clientX;
    resizeStartSize = parseInt(designLayer.style.width);
    e.preventDefault();
    e.stopPropagation();
  });

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const dx = e.clientX - resizeStartX;
    const newSize = Math.max(50, Math.min(380, resizeStartSize + dx));
    designLayer.style.width  = newSize + 'px';
    designLayer.style.height = newSize + 'px';
    sizeSlider.value = newSize; sizeVal.textContent = newSize;
  });

  document.addEventListener('mouseup', () => resizing = false);

  // Render
  renderBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    // Get design position/size in preview coords
    const px = parseInt(designLayer.style.left);
    const py = parseInt(designLayer.style.top);
    const pw = parseInt(designLayer.style.width);
    const ph = parseInt(designLayer.style.height);

    // Scale to actual shirt coords
    const sx = Math.round(px * SCALE_X);
    const sy = Math.round(py * SCALE_Y);
    const sw = Math.round(pw * SCALE_X);
    const sh = Math.round(ph * SCALE_Y);

    renderBtn.disabled = true;
    status.className = 'status loading';
    status.innerHTML = '<span class="spinner"></span>Rendering...';
    resultImg.classList.remove('visible');
    downloadBtn.classList.remove('visible');

    const form = new FormData();
    form.append('file', selectedFile);
    form.append('x', sx);
    form.append('y', sy);
    form.append('w', sw);
    form.append('h', sh);

    try {
      const res = await fetch('/render', { method: 'POST', body: form });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      resultImg.src = url;
      resultImg.classList.add('visible');
      downloadBtn.href = url;
      downloadBtn.classList.add('visible');
      status.className = 'status';
      status.textContent = '✓ Done';
    } catch (err) {
      status.className = 'status error';
      status.textContent = '✗ ' + err.message;
    } finally {
      renderBtn.disabled = false;
    }
  });
</script>
</body>
</html>
