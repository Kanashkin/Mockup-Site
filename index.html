<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --accent: #e8ff47; --text: #f0f0f0; --muted: #555;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 32px 16px; gap: 24px;
    }
    header { text-align: center; }
    h1 { font-size: 30px; font-weight: 700; letter-spacing: -1px; }
    h1 span { color: var(--accent); }
    .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

    .main {
      display: flex; gap: 28px; width: 100%; max-width: 1060px;
      align-items: flex-start;
    }

    /* ── EDITOR ── */
    .editor {
      flex: 0 0 auto;
      position: relative;
      width: 460px;
    }

    /* The shirt preview image */
    #shirtPreview {
      width: 460px;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    /* Design overlay — sits on top of shirt, clipped to shirt bounds */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 460px;
      height: 100%;
      pointer-events: none;
    }

    /* Draggable design box */
    #designBox {
      position: absolute;
      display: none;
      cursor: move;
      pointer-events: all;
    }
    #designBox img {
      width: 100%; height: 100%;
      display: block; pointer-events: none;
      mix-blend-mode: multiply;
    }
    #designBox .border {
      position: absolute; inset: 0;
      border: 2px dashed var(--accent);
      pointer-events: none;
    }
    #designBox .handle {
      position: absolute; bottom: -7px; right: -7px;
      width: 16px; height: 16px;
      background: var(--accent); border-radius: 3px;
      cursor: se-resize; pointer-events: all;
    }

    /* ── SIDEBAR ── */
    .sidebar { flex: 1; display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .card-title {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
    }
    .card-body { padding: 16px; }

    /* Upload */
    .drop {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 24px 12px; text-align: center; cursor: pointer;
      transition: border-color .2s; position: relative;
    }
    .drop:hover { border-color: var(--accent); }
    .drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 26px; display: block; margin-bottom: 6px; }
    .drop-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .drop-text strong { color: var(--accent); }

    /* Sliders */
    .sliders { display: flex; flex-direction: column; gap: 10px; }
    .row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .row label { width: 52px; color: var(--muted); }
    .row input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; }
    .row span { width: 32px; text-align: right; font-size: 12px; }

    /* Buttons */
    .btn {
      width: 100%; padding: 13px; background: var(--accent);
      color: #111; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    .btn:disabled { opacity: .3; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: .85; }

    .dl {
      display: none; width: 100%; margin-top: 10px; padding: 11px;
      background: transparent; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 8px;
      font-size: 13px; font-weight: 600; text-align: center;
      text-decoration: none; cursor: pointer;
    }
    .dl.show { display: block; }

    /* Result */
    #resultImg { width: 100%; border-radius: 8px; display: none; margin-top: 4px; }
    #resultImg.show { display: block; }

    .status { margin-top: 8px; font-size: 12px; color: var(--muted); text-align: center; min-height: 16px; }
    .status.err { color: #f66; }
    .status.ok  { color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid rgba(232,255,71,.3); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>T-Shirt <span>Mockup</span></h1>
  <p class="sub">Drag your design onto the shirt, then generate</p>
</header>

<div class="main">

  <!-- Editor -->
  <div class="editor" id="editor">
    <img id="shirtPreview" src="/shirt_preview.png" alt="shirt" draggable="false">
    <div id="overlay">
      <div id="designBox">
        <img id="designImg" src="" alt="" draggable="false">
        <div class="border"></div>
        <div class="handle" id="resizeHandle"></div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="card">
      <div class="card-title">Upload Design</div>
      <div class="card-body">
        <div class="drop" id="drop">
          <input type="file" id="fileInput" accept="image/*">
          <span class="drop-icon">🎨</span>
          <div class="drop-text"><strong>Click to upload</strong> or drag & drop<br>PNG with transparency works best</div>
        </div>
      </div>
    </div>

    <div class="card" id="adjustCard" style="display:none">
      <div class="card-title">Adjust</div>
      <div class="card-body">
        <div class="sliders">
          <div class="row">
            <label>Size</label>
            <input type="range" id="sSize" min="40" max="320" value="160">
            <span id="vSize">160</span>
          </div>
          <div class="row">
            <label>X</label>
            <input type="range" id="sX" min="0" max="400" value="100">
            <span id="vX">100</span>
          </div>
          <div class="row">
            <label>Y</label>
            <input type="range" id="sY" min="0" max="600" value="120">
            <span id="vY">120</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Result</div>
      <div class="card-body">
        <button class="btn" id="renderBtn" disabled>Generate Mockup →</button>
        <div class="status" id="status"></div>
        <img id="resultImg" alt="mockup result">
        <a class="dl" id="dlBtn" download="mockup.png">↓ Download PNG</a>
      </div>
    </div>

  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let file = null;

  const editor      = document.getElementById('editor');
  const shirtPreview= document.getElementById('shirtPreview');
  const designBox   = document.getElementById('designBox');
  const designImg   = document.getElementById('designImg');
  const resizeHandle= document.getElementById('resizeHandle');
  const renderBtn   = document.getElementById('renderBtn');
  const status      = document.getElementById('status');
  const resultImg   = document.getElementById('resultImg');
  const dlBtn       = document.getElementById('dlBtn');
  const adjustCard  = document.getElementById('adjustCard');

  const sSize = document.getElementById('sSize'), vSize = document.getElementById('vSize');
  const sX    = document.getElementById('sX'),    vX   = document.getElementById('vX');
  const sY    = document.getElementById('sY'),    vY   = document.getElementById('vY');

  // Preview dimensions (scaled)
  // Shirt is 600x900 in shirt_preview.png
  // We display it at 460px wide → height = 460/600 * 900 = 690
  const PREVIEW_W = 460;
  let   PREVIEW_H = 690; // updated after image loads

  // Actual shirt canvas size
  const SHIRT_W = 1334, SHIRT_H = 2000;

  shirtPreview.addEventListener('load', () => {
    PREVIEW_H = shirtPreview.offsetHeight;
    document.getElementById('overlay').style.height = PREVIEW_H + 'px';
    sY.max = PREVIEW_H - 40;
  });

  // ── Upload ─────────────────────────────────────────────────────────────────
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) load(e.target.files[0]);
  });
  const drop = document.getElementById('drop');
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor='var(--accent)'; });
  drop.addEventListener('dragleave', () => drop.style.borderColor='');
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.style.borderColor='';
    if (e.dataTransfer.files[0]) load(e.dataTransfer.files[0]);
  });

  function load(f) {
    file = f;
    designImg.src = URL.createObjectURL(f);
    designBox.style.display = 'block';
    adjustCard.style.display = 'block';
    renderBtn.disabled = false;
    applyPos();
  }

  // ── Position helpers ───────────────────────────────────────────────────────
  function applyPos() {
    const s = +sSize.value, x = +sX.value, y = +sY.value;
    designBox.style.width  = s + 'px';
    designBox.style.height = s + 'px';
    designBox.style.left   = x + 'px';
    designBox.style.top    = y + 'px';
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  sSize.addEventListener('input', () => { vSize.textContent = sSize.value; applyPos(); });
  sX.addEventListener('input',    () => { vX.textContent    = sX.value;    applyPos(); });
  sY.addEventListener('input',    () => { vY.textContent    = sY.value;    applyPos(); });

  // ── Drag ───────────────────────────────────────────────────────────────────
  let drag = false, dsx, dsy, dlx, dly;

  designBox.addEventListener('mousedown', e => {
    if (e.target === resizeHandle) return;
    drag = true;
    dsx = e.clientX; dsy = e.clientY;
    dlx = +sX.value; dly = +sY.value;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const sz = +sSize.value;
    const nx = clamp(dlx + e.clientX - dsx, 0, PREVIEW_W - sz);
    const ny = clamp(dly + e.clientY - dsy, 0, PREVIEW_H - sz);
    sX.value = nx; vX.textContent = Math.round(nx);
    sY.value = ny; vY.textContent = Math.round(ny);
    applyPos();
  });
  document.addEventListener('mouseup', () => drag = false);

  // ── Resize ─────────────────────────────────────────────────────────────────
  let resize = false, rsx, rss;
  resizeHandle.addEventListener('mousedown', e => {
    resize = true; rsx = e.clientX; rss = +sSize.value;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (!resize) return;
    const ns = clamp(rss + (e.clientX - rsx), 40, 320);
    sSize.value = ns; vSize.textContent = ns;
    applyPos();
  });
  document.addEventListener('mouseup', () => resize = false);

  // ── Render ─────────────────────────────────────────────────────────────────
  renderBtn.addEventListener('click', async () => {
    if (!file) return;

    // Scale preview coords → shirt canvas coords
    const scaleX = SHIRT_W / PREVIEW_W;
    const scaleY = SHIRT_H / PREVIEW_H;
    const sx = Math.round(+sX.value    * scaleX);
    const sy = Math.round(+sY.value    * scaleY);
    const sw = Math.round(+sSize.value * scaleX);
    const sh = Math.round(+sSize.value * scaleY);

    renderBtn.disabled = true;
    status.className = 'status';
    status.innerHTML = '<span class="spin"></span>Rendering…';
    resultImg.classList.remove('show');
    dlBtn.classList.remove('show');

    const form = new FormData();
    form.append('file', file);
    form.append('x', sx);
    form.append('y', sy);
    form.append('w', sw);
    form.append('h', sh);

    try {
      const res = await fetch('/render', { method: 'POST', body: form });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const url = URL.createObjectURL(await res.blob());
      resultImg.src = url;
      resultImg.classList.add('show');
      dlBtn.href = url;
      dlBtn.classList.add('show');
      status.className = 'status ok';
      status.textContent = '✓ Done';
    } catch (err) {
      status.className = 'status err';
      status.textContent = '✗ ' + err.message;
    } finally {
      renderBtn.disabled = false;
    }
  });
</script>
</body>
</html>
